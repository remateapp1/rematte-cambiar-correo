<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Correo actualizado | Rematte</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #fffcf4;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #171717;
    }

    .card {
      width: 90%;
      max-width: 420px;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 12px 36px rgba(0,0,0,0.08);
      overflow: hidden;
      text-align: center;
    }

    .header {
      background: #08655f;
      color: #ffffff;
      padding: 22px;
      font-size: 18px;
      font-weight: 700;
    }

    .content {
      padding: 34px 26px;
    }

    .icon {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: #ecfff6;
      color: #08655f;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 21px;
    }

    p {
      margin: 0 0 22px;
      color: #555;
      font-size: 14px;
      line-height: 1.5;
    }

    .button {
      display: inline-block;
      background: #08655f;
      color: #ffffff;
      text-decoration: none;
      padding: 13px 20px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
    }

    .note {
      margin-top: 22px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="header">Rematte app</div>

    <section class="content">
      <div class="icon">✓</div>

      <h1>Correo actualizado</h1>

      <p>
        Tu correo fue confirmado correctamente. Ya puedes volver a Rematte e ingresar con tu nuevo correo.
      </p>

      <a class="button" href="https://rematte.lat">
        Volver a Rematte
      </a>

      <div class="note">
        Si la app ya está abierta, ciérrala y vuelve a iniciar sesión.
      </div>
    </section>
  </main>
</body>
</html>
